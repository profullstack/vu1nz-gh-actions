# 🔐 vu1nz Actions Security Scanner — dogfooding workflow
#
# Scans this repository's own workflows for CI/CD vulnerabilities.
# For external repos: uses profullstack/vu1nz-gh-actions/.github/actions/vu1nz-actions-scan@v1

name: vu1nz Actions Security Scan

on:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
  pull_request:
    branches: [main, master]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
  workflow_dispatch:

jobs:
  scan-actions:
    name: Scan workflows for CI/CD vulnerabilities
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      # Install vu1nz locally (for dogfooding)
      - name: Install vu1nz from source
        run: pip install -e .

      # Reusable action: scan this repo's workflows, fail on high+
      # External repos use: profullstack/vu1nz-gh-actions/.github/actions/vu1nz-actions-scan@v1
      - uses: ./.github/actions/vu1nz-actions-scan
        id: scan
        with:
          token: $
{{ secrets.GITHUB_TOKEN }}
          fail_on: high
          # claude_api_key: $
{{ secrets.ANTHROPIC_API_KEY }}  # Uncomment to enable Claude AI review

      # Post PR comment with findings summary
      - name: Post PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `$
{{ steps.scan.outputs.summary || 'vu1nz scan completed.' }}`;

            let body = `## 🔐 vu1nz Actions Security Scan\n\n${summary}\n\n`;

            const count = parseInt('$
{{ steps.scan.outputs.findings_count || '0' }}');
            const hasHC = '$
{{ steps.scan.outputs.has_high_critical }}' === 'true';

            if (hasHC) {
              body += '⚠️ **High or critical findings detected — review before merging.**\n\n';
            }
            body += '_Report artifact: vu1nz-actions-scan-report_\n';

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });
